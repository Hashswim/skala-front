<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">

<h2>👤 Sign Up</h2>
    <p>Welcome to SKALA-Front! Fill out the form below to create your account.</p>
    <hr>

    <!-- signup-card: 폼 전체를 하나의 카드로 감싸서 입체감을 줌 -->
    <div class="signup-card">
        <!-- method="get"이라 제출하면 입력값이 signUpResult.html?userId=...처럼 URL에 붙어서 넘어감 -->
        <form action="signUpResult.html" method="get">

            <!-- fieldset+legend: 관련된 입력 항목들을 하나의 그룹으로 묶어서 보여주는 시맨틱 태그 -->
            <fieldset>
                <legend>🔐 Account Info</legend>
                <p>
                    <!-- label의 for와 input의 id를 맞춰줘야 라벨을 클릭해도 입력창에 포커스가 감 -->
                    <label for="userId">ID: </label>
                    <input type="text" id="userId" name="userId" minlength="4" maxlength="15" required placeholder="4-15 alphanumeric characters">
                    <small>(Required)</small>
                </p>
                <p>
                    <label for="userPhone">Phone Number: </label>
                    <input type="tel" id="userPhone" name="userPhone" pattern="[0-9]{2,3}-[0-9]{3,4}-[0-9]{4}" placeholder="010-1234-5678">
                </p>
                <p>
                    <label for="userPw">Password: </label>
                    <input type="password" id="userPw" name="userPw" minlength="8" required placeholder="Enter at least 8 characters">
                    <small>(Required)</small>
                </p>
                <p>
                    <label for="userPwConfirm">Confirm Password: </label>
                    <input type="password" id="userPwConfirm" name="userPwConfirm" minlength="8" required placeholder="Re-enter your password">
                    <small>(Required)</small>
                </p>
                <p>
                    <label for="userEmail">E-mail: </label>
                    <input type="text" id="userEmail" name="userEmail" placeholder="example">
                    @
                    <select name="emailDomain">
                        <option value="direct">Enter manually</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="naver.com">naver.com</option>
                        <option value="daum.net">daum.net</option>
                    </select>
                </p>
            </fieldset>

            <br>

            <fieldset>
                <legend>🧑 Personal Profile</legend>
                <p>
                    <label for="userNickname">Nickname: </label>
                    <input type="text" id="userNickname" name="userNickname" maxlength="20" required placeholder="How should we call you?">
                    <small>(Required)</small>
                </p>
                <p>
                    <label for="userName">Name: </label>
                    <input type="text" id="userName" name="userName" required>
                </p>
                <p>
                    <label for="userBirth">Birthdate: </label>
                    <input type="date" id="userBirth" name="userBirth">
                </p>
                <p>
                    <label for="userPhoto">Profile Photo: </label>
                    <input type="file" id="userPhoto" name="userPhoto" accept="image/*">
                </p>
                <p>
                    <!-- 라디오 버튼은 name이 같아야 한 그룹으로 묶여서 하나만 선택 가능해짐 -->
                    Gender:
                    <label><input type="radio" name="gender" value="male" checked> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                    <label><input type="radio" name="gender" value="none"> None</label>
                </p>
                <p>
                    <!-- 체크박스는 name이 같아도 각각 독립적으로 여러 개 선택 가능 (라디오와의 차이점) -->
                    Interesting Areas (Multiple selections allowed): <br>
                    <label><input type="checkbox" name="interest" value="frontend"> Web Frontend (Vue.js/HTML)</label><br>
                    <label><input type="checkbox" name="interest" value="uiux"> UI/UX Design Standards</label><br>
                    <label><input type="checkbox" name="interest" value="backend"> Backend & Database</label><br>
                    <label><input type="checkbox" name="interest" value="devops"> Cloud & Infrastructure</label>
                </p>

                <p>
                    <label for="joinPath">Sign-up Source: </label>
                    <select id="joinPath" name="joinPath">
                        <option value="" disabled selected>-- Select an option --</option>
                        <option value="friend">Friend</option>
                        <option value="online">Online Advertisement</option>
                        <option value="socialMedia">Social Media</option>
                        <option value="etc">Other</option>
                    </select>
                </p>
            </fieldset>

            <br>

            <fieldset>
                <legend>✍️ Introduction</legend>
                <p>
                    <label for="intro">Self Introduction: </label><br>
                    <textarea id="intro" name="intro" rows="5" cols="50" placeholder="Introduce yourself"></textarea>
                </p>
            </fieldset>

            <br>

            <!-- 약관 동의: required 체크박스라 체크하지 않으면 폼이 제출되지 않음 -->
            <fieldset class="form-terms">
                <legend>✅ Terms & Conditions</legend>
                <label>
                    <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                    I agree to the <strong>Terms of Service</strong> and <strong>Privacy Policy</strong>.
                    <small>(Required)</small>
                </label>
            </fieldset>

            <br>

            <input type="submit" class="btn-submit" value="Submit">
            <input type="reset" class="btn-reset" value="Reset">

        </form>
    </div>

    </div>
</body>
</html>
